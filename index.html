<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First GitHub Website</title>
    <style>
        body {
            background-color: green;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
            color: white;
        }
        
        .header h1 {
            margin: 0;
            font-size: 96px;
        }
        
        .main-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 30px;
        }
        
        .typing-box {
            width: 600px;
            height: 300px;
            background-color: white;
            border: 2px solid black;
            padding: 20px;
            font-size: 16px;
            font-family: Arial, sans-serif;
            resize: none;
            box-sizing: border-box;
        }
        
        .start-button {
            width: 200px;
            height: 100px;
            background-color: white;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: black;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .start-button:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }
        
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
            flex-wrap: wrap;
        }
        
        .box {
            width: 4in;
            height: 4in;
            background-color: white;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            font-weight: bold;
            color: black;
            flex-direction: column;
            text-align: center;
        }
        
        .box:first-child {
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .box:first-child:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>learn more search more</h1>
    </div>
    
    <div class="main-section">
        <textarea class="typing-box" placeholder="Start typing here..."></textarea>
        <div class="start-button" onclick="window.location.href='page2.html'">Start</div>
    </div>
    
    <div class="container">
        <div class="box" onclick="window.location.href='page2.html'"><div>auto type</div><div>1.0</div></div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </div>
</body>
</html>
