<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First GitHub Website</title>
    <style>
        body {
            background-color: green;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
            color: white;
        }
        
        .header h1 {
            margin: 0;
            font-size: 96px;
        }
        
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
            flex-wrap: wrap;
            align-items: flex-start;
        }
        
        .box {
            width: 4in;
            height: 4in;
            background-color: white;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            font-weight: bold;
            color: black;
            flex-direction: column;
            text-align: center;
        }
        .box-link {
            text-decoration: none;
        }
        .box-link .box {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .box-link .box:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>learn more search more</h1>
    </div>
    
    <div class="container">
        <a class="box-link" href="page2.html">
            <div class="box"><div>auto type</div><div>1.0</div></div>
        </a>
        <a class="box-link" href="page3.html">
            <div class="box"><div>humanizer</div></div>
        </a>
    </div>
</body>
</html>
