<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2</title>
    <style>
        body {
            background-color: #32CD32;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .close-btn:hover {
            transform: scale(1.1);
        }
        
        .content {
            padding: 40px;
            color: white;
            text-align: center;
        }
        
        .large-box {
            width: 12in;
            height: 6in;
            background-color: white;
            border: 2px solid black;
            margin: 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: black;
        }
    </style>
</head>
<body>
    <div class="close-btn" onclick="window.location.href='index.html'">✕</div>
    
    <div class="content">
        <h1>Welcome to Page 2</h1>
        <p>Click the X in the top left to go back to the main page</p>
    </div>
    
    <div class="large-box">Large Box (12in × 6in)</div>
</body>
</html>
