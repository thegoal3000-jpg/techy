<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2</title>
    <style>
        body {
            background-color: #32CD32;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .close-btn:hover {
            transform: scale(1.1);
        }
        
        .content {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            width: 100%;
        }
        
        .type-box {
            width: 12in;
            height: 6in;
            background-color: white;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            padding: 20px;
            box-sizing: border-box;
            cursor: text;
        }
        
        .type-box:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .type-box-text {
            width: 100%;
            height: 100%;
            font-size: 18px;
            color: black;
            font-family: Arial, sans-serif;
            resize: none;
            border: none;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .type-box-text:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="close-btn" onclick="window.location.href='index.html'">✕</div>
    
    <div class="content">
        <h1>Welcome to Page 2</h1>
        <p>Click the X in the top left to go back to the main page</p>
    </div>
    
    <div class="type-box">
        <textarea class="type-box-text" placeholder="Click here and start typing..."></textarea>
    </div>
</body>
</html>
