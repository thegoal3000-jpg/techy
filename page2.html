<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2</title>
    <style>
        body {
            background-color: #32CD32;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }
        
        .close-btn:hover {
            transform: scale(1.1);
        }
        
        .content {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            width: 100%;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .type-box {
            width: 12in;
            height: 6in;
            background-color: white;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            padding: 20px;
            box-sizing: border-box;
            cursor: text;
        }
        
        .type-box:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .type-box-text {
            width: 100%;
            height: 100%;
            font-size: 18px;
            color: black;
            font-family: Arial, sans-serif;
            resize: none;
            border: none;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .type-box-text:focus {
            outline: none;
        }
        
        .start-box {
            width: 4in;
            height: 2in;
            background-color: white;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: black;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .button-row {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .small-type-box {
            width: 4in;
            height: 2in;
            background-color: white;
            border: 2px solid black;
            color: black;
            font-family: Arial, sans-serif;
            font-size: 24px;
            padding: 10px;
            resize: none;
            box-sizing: border-box;
        }

        .small-type-box:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .start-box:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }
        
        .start-box:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .start-box.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .instructions {
            color: white;
            font-size: 16px;
            margin-top: 20px;
            max-width: 600px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="close-btn" onclick="window.location.href='index.html'">✕</div>
    
    <div class="content">
        <h1>Welcome to Page 2</h1>
        <p>Click the X in the top left to go back to the main page</p>
    </div>
    
    <div class="container">
        <div class="type-box">
            <textarea id="inputText" class="type-box-text" placeholder="Click here and start typing..."></textarea>
        </div>
        <div class="button-row">
            <div id="startBtn" class="start-box">Start</div>
            <textarea id="outputText" class="small-type-box" placeholder="Typed text appears here..."></textarea>
        </div>
        <div class="instructions">
            <strong>How to use:</strong><br>
            1. Type your text in the box above<br>
            2. Click "Start"<br>
            3. After 5 seconds, your text will type into the small box at 40 words per minute
        </div>
    </div>

    <script>
        let isTyping = false;

        document.getElementById('startBtn').addEventListener('click', function() {
            if (isTyping) return;
            
            const startBtn = document.getElementById('startBtn');
            const inputText = document.getElementById('inputText');
            const text = inputText.value;
            
            if (!text) {
                alert('Please type something first!');
                return;
            }
            
            startBtn.classList.add('disabled');
            let countdown = 5;
            
            // Countdown
            startBtn.textContent = countdown;
            const countdownInterval = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    startBtn.textContent = countdown;
                } else {
                    clearInterval(countdownInterval);
                    startTyping(text, startBtn);
                }
            }, 1000);
        });

        async function startTyping(text, button) {
            isTyping = true;
            button.textContent = 'Start';

            const outputText = document.getElementById('outputText');
            const charDelay = 1000 / ((40 * 5) / 60);

            outputText.value = '';
            outputText.focus();

            for (let i = 0; i < text.length && isTyping; i++) {
                outputText.value += text[i];
                await new Promise(resolve => setTimeout(resolve, charDelay));
            }

            isTyping = false;
            button.classList.remove('disabled');
        }
    </script>
</body>
</html>
