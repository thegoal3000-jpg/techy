<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #050507; color: #f1f1f1; margin:0; padding:20px; }
    .container { max-width: 920px; margin: 40px auto; }
    h1 { font-family: 'Space Grotesk', sans-serif; text-align:center; font-size: 42px; }
    .subtitle { text-align:center; color:#aaa; margin-bottom:30px; }
    textarea { width:100%; min-height:380px; background:#0f0f14; border:1px solid #333; border-radius:16px; padding:24px; color:white; font-size:1.05rem; }
    button { width:100%; padding:18px; font-size:1.2rem; font-weight:600; background:#00d4aa; color:black; border:none; border-radius:12px; margin-top:20px; cursor:pointer; }
    .results { margin-top:40px; display:none; }
    .circle {
      width: 230px; height: 230px; margin:30px auto; border-radius:50%; 
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-size:4.2rem; font-weight:700; border:22px solid;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>AI Detector</h1>
  <p class="subtitle">High Accuracy • Powered by AI</p>

  <textarea id="inputText" placeholder="Paste your text here..."></textarea>
  <button onclick="scanText()">🔍 Scan for AI</button>

  <div id="loader" style="text-align:center; margin:40px; display:none; color:#00d4aa;">Analyzing with AI model...</div>
  <div class="results" id="results"></div>
</div>

<script>
// ================== YOUR API KEY ==================
const API_KEY = "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";
// =================================================

async function scanText() {
  const text = document.getElementById('inputText').value.trim();
  if (text.length < 100) {
    alert("Please enter at least 100 characters for better accuracy.");
    return;
  }

  document.getElementById('loader').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  try {
    const result = await detectWithAI(text);
    showResults(result);
  } catch (err) {
    alert("Error: " + err.message);
  }

  document.getElementById('loader').style.display = 'none';
}

async function detectWithAI(text) {
  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${API_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "qwen/qwen3-32b",
      temperature: 0.1,
      messages: [
        {
          role: "system",
          content: `You are an expert AI content detector. Return ONLY valid JSON in this format:
{
  "aiProbability": 85,
  "verdict": "Highly Likely AI",
  "explanation": "Short explanation here",
  "keyReasons": ["reason 1", "reason 2"]
}`
        },
        { role: "user", content: `Analyze this text for AI generation:\n\n${text}` }
      ]
    })
  });

  const data = await res.json();
  const content = data.choices[0].message.content;
  return JSON.parse(content);
}

function showResults(r) {
  const color = r.aiProbability > 60 ? '#ef4444' : '#10b981';

  let html = `
    <div class="circle" style="color:${color}; border-color:${color}">
      ${r.aiProbability}%
      <div style="font-size:1.1rem; margin-top:12px;">AI Probability</div>
    </div>
    <h2 style="text-align:center; color:${color}">${r.verdict}</h2>
    <p style="text-align:center; margin:20px 0;">${r.explanation}</p>
    
    <h3>Key Reasons:</h3>
    <ul>
      ${r.keyReasons.map(reason => `<li>${reason}</li>`).join('')}
    </ul>
  `;

  document.getElementById('results').innerHTML = html;
  document.getElementById('results').style.display = 'block';
}
</script>
</body>
</html>
