<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPTZero - AI Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d4aa;
      --ai: #ef4444;
      --human: #10b981;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #050507;
      color: #f1f1f1;
    }
    .header {
      background: #0a0a0f;
      border-bottom: 1px solid #1f1f23;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }

    .main { max-width: 900px; margin: 50px auto; padding: 0 20px; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 42px; text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #aaa; font-size: 1.2rem; margin-bottom: 40px; }

    textarea {
      width: 100%;
      min-height: 380px;
      background: #0f0f14;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 24px;
      color: #fff;
      font-size: 1.05rem;
      resize: vertical;
    }
    .char-info {
      display: flex; justify-content: space-between; margin-top: 10px; color: #777; font-size: 0.95rem;
    }

    button {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(90deg, #00d4aa, #00f0c0);
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 20px;
    }

    .results { display: none; margin-top: 50px; }
    .score-circle {
      width: 240px;
      height: 240px;
      margin: 30px auto;
      border-radius: 50%;
      border: 24px solid #1a1a20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      font-weight: 700;
    }
    .verdict {
      text-align: center;
      font-size: 1.7rem;
      font-weight: 600;
      margin: 20px 0 40px;
    }

    .sentence-box {
      background: #0f0f14;
      border-radius: 16px;
      padding: 30px;
      margin-top: 40px;
    }
    .sentence {
      padding: 18px 22px;
      margin: 12px 0;
      border-radius: 12px;
      border-left: 6px solid;
      background: #14141a;
    }
    .sentence.ai { border-color: var(--ai); }
    .sentence.human { border-color: var(--human); }
    .sentence-info { margin-top: 8px; font-size: 0.88rem; color: #888; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">GPTZero</div>
  </div>

  <div class="main">
    <h1>AI Detector</h1>
    <p class="subtitle">Detect ChatGPT, Claude, Gemini, and other AI content</p>

    <textarea id="inputText" placeholder="Paste your text here..."></textarea>
    <div class="char-info">
      <span id="charCount">0 characters</span>
      <span>Minimum 50+ characters recommended</span>
    </div>

    <button onclick="scanForAI()">Scan for AI</button>

    <div id="loader" style="text-align:center; padding:80px; display:none; color:var(--primary);">
      Analyzing Perplexity & Burstiness...
    </div>

    <div class="results" id="results"></div>
  </div>

<script>
function scanForAI() {
  const text = document.getElementById('inputText').value.trim();
  if (text.length < 50) {
    alert("Please paste at least 50 characters for accurate detection.");
    return;
  }

  document.getElementById('loader').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  setTimeout(() => {
    const result = gptZeroStyleAnalyze(text);
    showResults(result);
    document.getElementById('loader').style.display = 'none';
  }, 850);
}

// Improved GPTZero-style detection (Perplexity + Burstiness simulation)
function gptZeroStyleAnalyze(text) {
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  let totalPerplexity = 0;
  let aiSentences = 0;
  let analyzed = [];

  sentences.forEach(sent => {
    const words = sent.trim().split(/\s+/);
    const wordCount = words.length;
    let score = 40; // base

    // Perplexity simulation (predictability)
    const hasCommonAITransitions = /furthermore|moreover|additionally|therefore|thus|hence|in conclusion|overall|it is important/gi.test(sent);
    if (hasCommonAITransitions) score += 28;

    // Burstiness simulation (sentence length variation)
    if (wordCount >= 12 && wordCount <= 28) score += 22;           // uniform length = more AI-like
    if (wordCount > 35) score += 12;

    // Repetition
    if (/very very|really really|the fact that/gi.test(sent)) score += 20;

    score = Math.min(95, score);

    if (score > 65) aiSentences++;

    totalPerplexity += score;

    analyzed.push({
      text: sent.trim(),
      score: Math.round(score),
      type: score > 70 ? 'ai' : score > 50 ? 'mixed' : 'human'
    });
  });

  const aiProbability = Math.round(totalPerplexity / sentences.length);
  const humanScore = 100 - aiProbability;

  return {
    aiProbability: aiProbability,
    humanScore: humanScore,
    sentences: analyzed
  };
}

function showResults(result) {
  const color = result.aiProbability > 65 ? 'var(--ai)' : 'var(--human)';

  let html = `
    <div style="text-align:center;">
      <div class="score-circle" style="color:${color}; border-color:${color}">
        ${result.aiProbability}%
        <div style="font-size:1.1rem; margin-top:10px; color:#ccc;">AI Probability</div>
      </div>
    </div>

    <div class="verdict" style="color:${color}">
      ${result.aiProbability > 75 ? '🔴 Highly Likely AI-Generated' : 
        result.aiProbability > 55 ? '🟠 Mixed Content' : '🟢 Likely Human Written'}
    </div>

    <div class="sentence-box">
      <h2 style="margin-bottom:20px;">Sentence Analysis</h2>
  `;

  result.sentences.forEach(s => {
    const cls = s.type === 'ai' ? 'ai' : 'human';
    html += `
      <div class="sentence ${cls}">
        ${s.text}
        <div class="sentence-info">
          ${s.type.toUpperCase()} • ${s.score}% AI likelihood
        </div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById('results').innerHTML = html;
  document.getElementById('results').style.display = 'block';
}

// Character counter
document.getElementById('inputText').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length + " characters";
});
</script>
</body>
</html>
