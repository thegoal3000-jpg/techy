<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPTZero - AI Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d4aa;
      --ai: #ef4444;
      --human: #10b981;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #f1f1f1;
      line-height: 1.6;
    }
    .header {
      background: #111113;
      border-bottom: 1px solid #222;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    .main {
      max-width: 920px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 12px;
    }
    .subtitle {
      text-align: center;
      color: #aaa;
      font-size: 1.15rem;
      margin-bottom: 40px;
    }

    .textarea-container {
      background: #121216;
      border: 2px solid #333;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      min-height: 320px;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 1.05rem;
      resize: vertical;
    }
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      font-size: 0.95rem;
    }
    button {
      background: var(--primary);
      color: black;
      border: none;
      padding: 14px 48px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
    }
    button:hover { background: #00e6b8; }

    .results { display: none; margin-top: 40px; }
    .score-area {
      display: flex;
      justify-content: center;
      gap: 60px;
      flex-wrap: wrap;
      margin: 30px 0;
    }
    .overall-score {
      text-align: center;
    }
    .circle {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      border: 18px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 3.8rem;
      font-weight: 700;
      margin: 0 auto 12px;
    }
    .label { font-size: 1.1rem; color: #ccc; }

    .sentence-list {
      background: #121216;
      border-radius: 16px;
      padding: 24px;
      margin-top: 40px;
    }
    .sentence {
      padding: 16px 18px;
      margin: 12px 0;
      border-radius: 10px;
      border-left: 6px solid;
    }
    .sentence.ai { border-color: var(--ai); background: rgba(239,68,68,0.1); }
    .sentence.human { border-color: var(--human); background: rgba(16,185,129,0.08); }
    .sentence.mixed { border-color: #f59e0b; background: rgba(245,158,11,0.1); }

    .footer-info {
      text-align: center;
      margin-top: 50px;
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">GPTZero</div>
    <div style="color:#888;">Free AI Detector</div>
  </div>

  <div class="main">
    <h1>Detect AI Writing</h1>
    <p class="subtitle">Paste text below to check for ChatGPT, Claude, Gemini, and other AI content</p>

    <div class="textarea-container">
      <textarea id="inputText" placeholder="Paste your text here..."></textarea>
      <div class="bottom-bar">
        <span id="charCount">0 characters</span>
        <span>Minimum 50 characters recommended</span>
      </div>
    </div>

    <button onclick="scanText()">Scan for AI</button>

    <!-- Loader -->
    <div id="loader" style="text-align:center; padding:60px; display:none;">
      <p style="color:var(--primary); font-size:1.1rem;">Analyzing Perplexity & Burstiness...</p>
    </div>

    <!-- Results -->
    <div class="results" id="results"></div>
  </div>

  <div class="footer-info">
    This is a fan-made clone for demonstration • Not affiliated with official GPTZero
  </div>

<script>
function scanText() {
  const text = document.getElementById('inputText').value.trim();
  if (text.length < 50) {
    alert("Please paste at least 50 characters.");
    return;
  }

  document.getElementById('loader').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  setTimeout(() => {
    const result = analyzeText(text);
    showResults(result, text);
    document.getElementById('loader').style.display = 'none';
  }, 800);
}

function analyzeText(text) {
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  let aiCount = 0;
  let totalScore = 0;

  const analyzed = sentences.map(s => {
    const lower = s.toLowerCase();
    let score = 45;
    let type = "human";

    if (lower.length > 80 && lower.split(' ').length < 25) score += 20;
    if (/furthermore|moreover|additionally|therefore|thus|in conclusion|overall/gi.test(lower)) score += 30;
    if (/very very|really really|the fact that/gi.test(lower)) score += 25;

    if (score > 70) { type = "ai"; aiCount++; }
    else if (score > 55) type = "mixed";

    totalScore += score;
    return { text: s.trim(), score: Math.min(95, Math.round(score)), type };
  });

  const aiProbability = Math.round((aiCount / sentences.length) * 100);
  const avgScore = Math.round(totalScore / sentences.length);

  return {
    aiProbability: aiProbability,
    humanScore: 100 - avgScore,
    sentences: analyzed
  };
}

function showResults(result, originalText) {
  let html = `
    <div class="score-area">
      <div class="overall-score">
        <div class="circle" style="color: ${result.aiProbability > 60 ? 'var(--ai)' : 'var(--human)'}; border-color: ${result.aiProbability > 60 ? 'var(--ai)' : 'var(--human)'}">
          ${result.aiProbability}%
          <div class="label">AI Probability</div>
        </div>
      </div>
    </div>

    <div style="text-align:center; font-size:1.6rem; margin:20px 0;">
      ${result.aiProbability > 70 ? '🔴 Likely AI-Generated' : result.aiProbability > 45 ? '🟠 Mixed Content' : '🟢 Likely Human'}
    </div>

    <div class="sentence-list">
      <h3 style="margin-bottom:20px; color:#ddd">Sentence Analysis</h3>
  `;

  result.sentences.forEach(s => {
    const cls = s.type === 'ai' ? 'ai' : s.type === 'mixed' ? 'mixed' : 'human';
    html += `
      <div class="sentence ${cls}">
        ${s.text}
        <div style="margin-top:8px; font-size:0.85rem; color:#999;">
          ${s.type.toUpperCase()} • ${s.score}% AI likelihood
        </div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById('results').innerHTML = html;
  document.getElementById('results').style.display = 'block';
}

// Character counter
document.getElementById('inputText').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length + " characters";
});
</script>
</body>
</html>
