<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPTZero - AI Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d4aa;
      --ai-red: #ef4444;
      --human-green: #10b981;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #050507;
      color: #f8f8f8;
      line-height: 1.6;
    }
    .header {
      background: #0a0a0f;
      border-bottom: 1px solid #1f1f23;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -1px;
    }
    .nav a {
      color: #aaa;
      margin-left: 32px;
      text-decoration: none;
      font-weight: 500;
    }

    .main { max-width: 920px; margin: 60px auto; padding: 0 20px; }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 42px;
      text-align: center;
      margin-bottom: 16px;
    }
    .subtitle {
      text-align: center;
      color: #999;
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto 50px;
    }

    .upload-box {
      background: #0f0f14;
      border: 2px dashed #333;
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      margin-bottom: 30px;
    }
    textarea {
      width: 100%;
      min-height: 380px;
      background: #0a0a0f;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 24px;
      color: #fff;
      font-size: 1.05rem;
      resize: vertical;
    }

    .char-info {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 0.95rem;
      color: #777;
    }

    button {
      background: linear-gradient(90deg, #00d4aa, #00e6c0);
      color: #000;
      font-weight: 600;
      font-size: 1.15rem;
      padding: 18px 60px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 212, 170, 0.3);
    }

    .results { display: none; margin-top: 50px; }
    .score-container {
      display: flex;
      justify-content: center;
      gap: 80px;
      flex-wrap: wrap;
      margin: 40px 0;
    }
    .big-score {
      text-align: center;
    }
    .circle {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 22px solid #1a1a1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 4.2rem;
      font-weight: 700;
      position: relative;
    }
    .circle-label {
      font-size: 1.1rem;
      color: #aaa;
      margin-top: 8px;
    }

    .sentence-analysis {
      background: #0f0f14;
      border-radius: 20px;
      padding: 32px;
      margin-top: 60px;
    }
    .sentence {
      padding: 18px 22px;
      margin: 14px 0;
      border-radius: 12px;
      border-left: 6px solid;
      background: #14141a;
    }
    .sentence.ai { border-color: var(--ai-red); }
    .sentence.human { border-color: var(--human-green); }
    .sentence-info {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">GPTZero</div>
    <div class="nav">
      <a href="#">Features</a>
      <a href="#">Pricing</a>
      <a href="#">For Education</a>
    </div>
  </div>

  <div class="main">
    <h1>AI Detector</h1>
    <p class="subtitle">The most trusted AI detector for ChatGPT, Claude, Gemini, and more.</p>

    <div class="upload-box">
      <textarea id="inputText" placeholder="Paste your text here (or upload a document)..."></textarea>
      <div class="char-info">
        <span id="charCount">0 / 10,000 characters</span>
        <span>Supports .txt, .docx, .pdf</span>
      </div>
    </div>

    <button onclick="scanForAI()">Scan for AI</button>

    <div id="loader" style="text-align:center; padding:80px 20px; display:none; color:var(--primary); font-size:1.1rem;">
      Scanning for AI patterns • Perplexity + Burstiness + Deep Analysis...
    </div>

    <div class="results" id="results"></div>
  </div>

<script>
function scanForAI() {
  const text = document.getElementById('inputText').value.trim();
  if (text.length < 50) {
    alert("Please enter at least 50 characters.");
    return;
  }

  document.getElementById('loader').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  setTimeout(() => {
    const result = analyzeText(text);
    displayResults(result);
    document.getElementById('loader').style.display = 'none';
  }, 900);
}

function analyzeText(text) {
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  let aiCount = 0;
  let totalAI = 0;

  const analyzedSentences = sentences.map(sent => {
    const lower = sent.toLowerCase();
    let aiScore = 35;

    if (/furthermore|moreover|additionally|therefore|thus|in conclusion|overall/gi.test(lower)) aiScore += 32;
    if (sent.split(' ').length > 12 && sent.split(' ').length < 28) aiScore += 18;
    if (/very very|really really|the fact that|it is important/gi.test(lower)) aiScore += 25;

    aiScore = Math.min(96, aiScore);
    if (aiScore > 65) aiCount++;
    totalAI += aiScore;

    return {
      text: sent.trim(),
      aiScore: Math.round(aiScore),
      type: aiScore > 70 ? 'ai' : aiScore > 50 ? 'mixed' : 'human'
    };
  });

  const aiProbability = Math.round((totalAI / sentences.length));
  const humanScore = 100 - aiProbability;

  return {
    aiProbability: aiProbability,
    humanScore: humanScore,
    sentences: analyzedSentences
  };
}

function displayResults(result) {
  let html = `
    <div class="score-container">
      <div class="big-score">
        <div class="circle" style="color: ${result.aiProbability > 65 ? 'var(--ai-red)' : 'var(--human-green)'};">
          ${result.aiProbability}%
          <div class="circle-label">AI Probability</div>
        </div>
      </div>
    </div>

    <div style="text-align:center; font-size:1.8rem; font-weight:600; margin:30px 0;">
      ${result.aiProbability > 75 ? '🔴 Highly Likely AI-Generated' : 
        result.aiProbability > 50 ? '🟠 Mixed Content Detected' : '🟢 Likely Human Written'}
    </div>

    <div class="sentence-analysis">
      <h2 style="margin-bottom:24px; font-size:1.5rem;">Sentence-by-Sentence Breakdown</h2>
  `;

  result.sentences.forEach(s => {
    const cls = s.type === 'ai' ? 'ai' : 'human';
    html += `
      <div class="sentence ${cls}">
        ${s.text}
        <div class="sentence-info">
          ${s.type.toUpperCase()} — ${s.aiScore}% AI Likelihood
        </div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById('results').innerHTML = html;
  document.getElementById('results').style.display = 'block';
}

// Live character counter
document.getElementById('inputText').addEventListener('input', function() {
  const count = this.value.length;
  document.getElementById('charCount').textContent = `${count} / 10,000 characters`;
});
</script>
</body>
</html>
