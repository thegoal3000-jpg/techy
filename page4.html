<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPTZero Style AI Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #050507; color: #f1f1f1; margin:0; padding:20px; }
    .container { max-width: 900px; margin: 40px auto; }
    h1 { font-family: 'Space Grotesk', sans-serif; text-align:center; font-size: 42px; }
    .subtitle { text-align:center; color:#aaa; margin-bottom:30px; }
    textarea { width:100%; min-height:360px; background:#0f0f14; border:1px solid #333; border-radius:16px; padding:24px; color:white; font-size:1.05rem; }
    button { width:100%; padding:18px; font-size:1.2rem; font-weight:600; background:#00d4aa; color:black; border:none; border-radius:12px; margin-top:15px; cursor:pointer; }
    .key-input { margin:15px 0; padding:12px; background:#1a1a1f; border-radius:8px; }
    .results { margin-top:40px; display:none; }
    .scores { display:flex; justify-content:center; gap:50px; flex-wrap:wrap; margin:30px 0; }
    .circle {
      width: 200px; height: 200px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-size:3.5rem; font-weight:700; border:18px solid;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>AI Detector</h1>
  <p class="subtitle">High Accuracy Mode (Using AI Model)</p>

  <div class="key-input">
    <strong>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:</strong><br>
    <input type="password" id="apiKey" placeholder="sk-or-v1-..." style="width:100%; padding:10px; margin-top:8px; background:#111; border:none; color:white; border-radius:6px;">
    <small>Key will be saved only in your browser (localStorage)</small>
  </div>

  <textarea id="inputText" placeholder="Paste your text here..."></textarea>
  <button onclick="scanText()">🔍 Scan for AI</button>

  <div id="loader" style="text-align:center; margin-top:30px; display:none;">Analyzing with AI model...</div>
  <div class="results" id="results"></div>
</div>

<script>
const defaultKey = ''; // Leave empty

async function scanText() {
  let apiKey = document.getElementById('apiKey').value.trim();
  const text = document.getElementById('inputText').value.trim();

  if (text.length < 80) {
    alert("Please enter at least 80 characters.");
    return;
  }
  if (!apiKey) {
    apiKey = localStorage.getItem('openrouter_key') || defaultKey;
  }
  if (!apiKey) {
    alert("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");
    return;
  }

  // Save key for next time
  localStorage.setItem('openrouter_key', apiKey);

  document.getElementById('loader').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  try {
    const result = await callAI Detector(apiKey, text);
    showResults(result);
  } catch (e) {
    alert("Error: " + e.message);
  }

  document.getElementById('loader').style.display = 'none';
}

async function callAI Detector(apiKey, text) {
  const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${apiKey}`,
      "HTTP-Referer": "https://your-site.com",
      "X-Title": "AI Detector",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "qwen/qwen3-32b",   // Strong & cheap model
      messages: [{
        role: "system",
        content: `You are an expert AI content detector. Analyze the text and return ONLY a valid JSON object with this format:
{
  "aiProbability": number (0-100),
  "verdict": "Highly Likely AI" | "Likely AI" | "Mixed" | "Likely Human" | "Highly Likely Human",
  "explanation": "short explanation",
  "keyReasons": ["reason1", "reason2"]
}`
      },
      {
        role: "user",
        content: `Analyze this text for AI generation:\n\n${text}`
      }]
    })
  });

  const data = await response.json();
  const content = data.choices[0].message.content;
  return JSON.parse(content);
}

function showResults(result) {
  const color = result.aiProbability > 60 ? '#ef4444' : '#10b981';

  let html = `
    <div class="scores">
      <div style="text-align:center;">
        <div class="circle" style="color:${color}; border-color:${color}">
          ${result.aiProbability}%
          <div style="font-size:1rem; margin-top:8px;">AI Probability</div>
        </div>
      </div>
    </div>

    <h2 style="text-align:center; color:${color}">${result.verdict}</h2>
    <p style="text-align:center; margin:20px 0;">${result.explanation}</p>

    <h3>Key Reasons:</h3>
    <ul>
      ${result.keyReasons.map(r => `<li>${r}</li>`).join('')}
    </ul>
  `;

  document.getElementById('results').innerHTML = html;
  document.getElementById('results').style.display = 'block';
}
</script>
</body>
</html>
