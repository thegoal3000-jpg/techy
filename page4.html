<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Detector — Is Your Text Human or AI?</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;
      --text:#f0eeff;--text-muted:#7a7a9a;
      --human:#34d399;--human-bg:rgba(52,211,153,0.1);--human-border:rgba(52,211,153,0.3);
      --ai:#f87171;--ai-bg:rgba(248,113,113,0.1);--ai-border:rgba(248,113,113,0.3);
      --mixed:#fbbf24;--mixed-bg:rgba(251,191,36,0.1);--mixed-border:rgba(251,191,36,0.3);
      --radius:14px;
    }
    body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 70% 50% at 10% -5%,rgba(52,211,153,0.07) 0%,transparent 55%),
                 radial-gradient(ellipse 60% 40% at 90% 100%,rgba(248,113,113,0.06) 0%,transparent 55%)}
    header{position:relative;z-index:10;padding:20px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.8);backdrop-filter:blur(12px)}
    .back-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:1rem;text-decoration:none;transition:all 0.2s}
    .back-btn:hover{border-color:var(--human);color:var(--text)}
    .logo{display:flex;align-items:center;gap:10px;font-size:1.1rem;font-weight:700;letter-spacing:-0.02em}
    .logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--human),#059669);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
    .logo span{color:var(--human)}
    .badge{font-size:0.7rem;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);color:var(--human);letter-spacing:0.05em;text-transform:uppercase}
    
    .hero{position:relative;z-index:5;text-align:center;padding:52px 20px 36px}
    .hero-tag{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--human);background:var(--human-bg);border:1px solid var(--human-border);padding:5px 14px;border-radius:20px;margin-bottom:20px}
    h1{font-size:clamp(1.8rem,4.5vw,2.9rem);font-weight:700;letter-spacing:-0.04em;line-height:1.1;margin-bottom:14px}
    h1 .g{background:linear-gradient(135deg,#fff 0%,var(--human) 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-sub{font-size:0.95rem;color:var(--text-muted);max-width:440px;margin:0 auto;line-height:1.7;font-weight:300}
    
    .tool-wrap{position:relative;z-index:5;max-width:860px;margin:36px auto 0;padding:0 20px 60px}
    .input-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
    .input-panel:focus-within{border-color:rgba(52,211,153,0.35)}
    .panel-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface2)}
    .panel-title{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted)}
    textarea{width:100%;min-height:240px;background:transparent;border:none;outline:none;resize:none;color:var(--text);font-family:'Sora',sans-serif;font-size:0.9rem;line-height:1.75;padding:18px;font-weight:300}
    .panel-footer{padding:8px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-muted);font-family:'DM Mono',monospace}
    
    .btn-analyze{font-family:'Sora',sans-serif;font-size:0.95rem;font-weight:600;padding:14px 48px;border-radius:10px;border:none;background:linear-gradient(135deg,#059669 0%,var(--human) 100%);color:#fff;cursor:pointer;transition:all 0.25s;display:block;margin:0 auto 28px;box-shadow:0 0 28px rgba(52,211,153,0.2)}
    .btn-analyze:hover{transform:translateY(-1px);box-shadow:0 6px 36px rgba(52,211,153,0.3)}
    
    .results{display:none;animation:fadeUp 0.4s ease}
    .results.visible{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    
    .score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:16px;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
    .score-card.human{border-color:var(--human-border);background:linear-gradient(135deg,var(--surface) 60%,var(--human-bg))}
    .score-card.ai{border-color:var(--ai-border);background:linear-gradient(135deg,var(--surface) 60%,var(--ai-bg))}
    .score-card.mixed{border-color:var(--mixed-border);background:linear-gradient(135deg,var(--surface) 60%,var(--mixed-bg))}
    
    .score-dial{position:relative;width:110px;height:110px;flex-shrink:0}
    .score-dial svg{width:110px;height:110px;transform:rotate(-90deg)}
    .score-dial-track{fill:none;stroke:var(--border);stroke-width:8}
    .score-dial-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
    .score-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;letter-spacing:-0.03em;line-height:1}
    .score-num small{font-size:0.65rem;font-weight:500;color:var(--text-muted);letter-spacing:0.05em;text-transform:uppercase;margin-top:2px}
    
    .score-bars{display:flex;flex-direction:column;gap:10px;min-width:180px}
    .bar-item{display:flex;flex-direction:column;gap:4px}
    .bar-label{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-muted);font-family:'DM Mono',monospace}
    .bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1);width:0%}
    .bar-fill.human{background:var(--human)}
    .bar-fill.ai{background:var(--ai)}
    .bar-fill.mixed{background:var(--mixed)}
    
    .highlights-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .highlights-body{padding:20px;font-size:0.9rem;line-height:2;font-weight:300}
    .sent{display:inline;border-radius:3px;padding:1px 3px;cursor:default}
    .sent.ai-sent{background:rgba(248,113,113,0.18);border-bottom:2px solid rgba(248,113,113,0.5)}
    .sent.human-sent{background:rgba(52,211,153,0.08)}
    .sent.mixed-sent{background:rgba(251,191,36,0.14);border-bottom:2px solid rgba(251,191,36,0.4)}
    
    .legend{display:flex;gap:20px;padding:12px 20px;border-top:1px solid var(--border);background:var(--surface2);flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--text-muted);font-weight:500}
    .legend-dot{width:10px;height:10px;border-radius:2px}
    .legend-dot.ai{background:rgba(248,113,113,0.5)}
    .legend-dot.human{background:rgba(52,211,153,0.4)}
    .legend-dot.mixed{background:rgba(251,191,36,0.5)}
    
    .loader-wrap{text-align:center;padding:40px;display:none}
    .loader-wrap.visible{display:block}
    .loader-ring{display:inline-block;width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--human);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    .toast{position:fixed;bottom:28px;right:28px;background:var(--surface2);border:1px solid var(--human-border);border-radius:10px;padding:11px 16px;font-size:0.82rem;color:var(--text);display:flex;align-items:center;gap:7px;z-index:999;opacity:0;transform:translateY(8px);transition:all 0.3s}
    .toast.show{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="index.html">✕</a>
  <div class="logo"><div class="logo-icon">🔍</div>AI<span>Detector</span></div>
  <div class="badge">Offline Mode</div>
</header>

<section class="hero">
  <div class="hero-tag">Statistical + Rule-Based</div>
  <h1><span class="g">Is Your Text Human<br>or AI-Generated?</span></h1>
  <p class="hero-sub">Analyzes Perplexity, Burstiness, Repetition & more — no API needed.</p>
</section>

<div class="tool-wrap">
  <div class="input-panel">
    <div class="panel-header">
      <span class="panel-title">Text to Analyze</span>
    </div>
    <textarea id="inputText" placeholder="Paste your text here..." oninput="updateCount()"></textarea>
    <div class="panel-footer">
      <span id="wordCount">0 words</span>
      <span>Min 30 words recommended</span>
    </div>
  </div>

  <button class="btn-analyze" onclick="analyze()">🔍 Analyze Text</button>

  <div class="loader-wrap" id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Analyzing patterns...</div>
  </div>

  <div class="results" id="results">
    <!-- Score and highlights will be injected here -->
  </div>
</div>

<div class="toast" id="toast">✓ <span id="toastMsg">Done!</span></div>

<script>
// =============== OFFLINE AI DETECTOR ===============
function updateCount() {
  const text = document.getElementById('inputText').value.trim();
  const words = text ? text.split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = `${words} words`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function calculateMetrics(text) {
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  const words = text.toLowerCase().match(/\b\w+\b/g) || [];
  
  // 1. Burstiness (sentence length variation)
  const lengths = sentences.map(s => s.trim().split(/\s+/).length);
  const avgLen = lengths.reduce((a,b)=>a+b,0) / lengths.length;
  const variance = lengths.reduce((sum, len) => sum + Math.pow(len - avgLen, 2), 0) / lengths.length;
  const burstiness = Math.min(100, Math.sqrt(variance) * 8); // higher = more human

  // 2. Repetitive transitions
  const transitions = ["furthermore", "moreover", "however", "therefore", "additionally", "in conclusion", "additionally", "thus", "hence"];
  let transCount = 0;
  const lowerText = text.toLowerCase();
  transitions.forEach(t => {
    const regex = new RegExp(`\\b${t}\\b`, 'gi');
    transCount += (lowerText.match(regex) || []).length;
  });
  const repetitionScore = Math.max(0, 100 - transCount * 12);

  // 3. Perplexity approximation (word predictability)
  let bigramScore = 0;
  for (let i = 1; i < words.length; i++) {
    if (words[i-1] === words[i]) bigramScore += 15; // penalty for repetition
  }
  const perplexityScore = Math.max(20, 100 - (bigramScore / words.length * 30));

  // 4. Overall score
  const humanScore = Math.round((burstiness * 0.4) + (repetitionScore * 0.35) + (perplexityScore * 0.25));
  
  return {
    humanScore: Math.min(98, Math.max(5, humanScore)),
    burstiness: Math.round(burstiness),
    repetition: Math.round(repetitionScore),
    perplexity: Math.round(perplexityScore),
    sentences: sentences
  };
}

function analyze() {
  const input = document.getElementById('inputText').value.trim();
  if (input.length < 30) {
    showToast('Please enter at least 30 words');
    return;
  }

  document.getElementById('loader').classList.add('visible');
  document.getElementById('results').classList.remove('visible');

  setTimeout(() => {
    const metrics = calculateMetrics(input);
    renderResults(metrics, input);
    
    document.getElementById('loader').classList.remove('visible');
    document.getElementById('results').classList.add('visible');
  }, 180);
}

function renderResults(metrics, originalText) {
  const score = metrics.humanScore;
  const cls = score >= 65 ? 'human' : score <= 40 ? 'ai' : 'mixed';
  const verdict = score >= 75 ? "Very Likely Human" :
                  score >= 60 ? "Likely Human" :
                  score <= 35 ? "Very Likely AI" :
                  score <= 50 ? "Likely AI" : "Uncertain";

  let html = `
    <div class="score-card ${cls}">
      <div class="score-dial">
        <svg viewBox="0 0 110 110">
          <circle class="score-dial-track" cx="55" cy="55" r="44"/>
          <circle class="score-dial-fill" cx="55" cy="55" r="44" stroke-dasharray="276.5" stroke-dashoffset="${276.5 - (score/100)*276.5}" stroke="#34d399"/>
        </svg>
        <div class="score-num"><span style="color:${score>=65?'#34d399':'#f87171'}">${score}%</span><small>Human</small></div>
      </div>
      <div>
        <h2 style="color:${score>=65?'#34d399':'#f87171'}">${verdict}</h2>
        <p>The text shows ${score >= 60 ? 'good natural variation' : 'high predictability and uniformity'}.</p>
      </div>
    </div>

    <div class="highlights-panel">
      <div class="panel-header"><span class="panel-title">Sentence Breakdown</span></div>
      <div class="highlights-body" style="line-height:1.85">
  `;

  const sentences = metrics.sentences;
  sentences.forEach(sent => {
    const len = sent.trim().split(/\s+/).length;
    let label = "human-sent";
    if (len > 18 && len < 28) label = "mixed-sent";   // uniform medium length
    if (sent.toLowerCase().includes("furthermore") || 
        sent.toLowerCase().includes("in conclusion")) label = "ai-sent";
    
    html += `<span class="sent ${label}">${sent.trim()} </span>`;
  });

  html += `
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot ai"></div> Likely AI</div>
        <div class="legend-item"><div class="legend-dot human"></div> Likely Human</div>
        <div class="legend-item"><div class="legend-dot mixed"></div> Mixed</div>
      </div>
    </div>
  `;

  document.getElementById('results').innerHTML = html;
}
</script>
</body>
</html>
