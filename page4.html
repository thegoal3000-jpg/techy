<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Detector - GPTZero Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --human: #10b981;
      --ai: #ef4444;
      --mixed: #f59e0b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e5e5e5;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 860px; margin: 30px auto; }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.6rem;
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle { text-align:center; color:#777; font-size:1.1rem; margin-bottom:40px; }

    .input-area {
      background: #121216;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      min-height: 260px;
      background: transparent;
      border: none;
      outline: none;
      color: #e5e5e5;
      font-size: 1.05rem;
    }
    .char-count { text-align:right; color:#666; margin-top:8px; }

    button {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(90deg, #10b981, #34d399);
      color: black;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 30px;
    }

    .results { display: none; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

    .main-score {
      text-align: center;
      margin: 30px 0;
    }
    .score-circle {
      width: 200px;
      height: 200px;
      margin: 0 auto;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: 700;
      border: 16px solid #222;
      background: #0f0f12;
    }
    .ai-prob { font-size: 1.1rem; margin-top: 8px; color: #ef4444; }

    .verdict {
      text-align: center;
      font-size: 1.55rem;
      margin: 16px 0 40px;
      font-weight: 600;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 30px 0;
      flex-wrap: wrap;
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 1.8rem; font-weight: 600; }
    .stat-label { font-size: 0.85rem; color: #888; }

    .highlight-box {
      background: #121216;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 24px;
      margin-top: 30px;
    }
    .sentence {
      padding: 14px 18px;
      margin: 12px 0;
      border-radius: 10px;
      border-left: 5px solid transparent;
    }
    .sentence.ai { background: rgba(239,68,68,0.12); border-color: var(--ai); }
    .sentence.human { background: rgba(16,185,129,0.08); border-color: var(--human); }
    .reason { font-size: 0.83rem; color: #999; margin-top: 6px; }
  </style>
</head>
<body>

<div class="container">
  <h1>AI Detector</h1>
  <p class="subtitle">Powered by Perplexity • Burstiness • Pattern Analysis (GPTZero Style)</p>

  <div class="input-area">
    <textarea id="textInput" placeholder="Paste your text here..."></textarea>
    <div class="char-count"><span id="count">0</span> characters</div>
  </div>

  <button onclick="analyzeText()">🔍 Scan for AI</button>

  <div id="loader" style="text-align:center; padding:60px; display:none; color:#888;">
    Analyzing writing patterns...
  </div>

  <div class="results" id="results"></div>
</div>

<script>
function analyzeText() {
  const text = document.getElementById('textInput').value.trim();
  if (text.length < 60) {
    alert("Please enter at least 60 characters for better accuracy.");
    return;
  }

  document.getElementById('loader').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  setTimeout(() => {
    const result = detectAI(text);
    renderResults(result, text);
    document.getElementById('loader').style.display = 'none';
  }, 550);
}

function detectAI(text) {
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  let aiScoreTotal = 0;
  let aiSentences = 0;

  const transRegex = /furthermore|moreover|additionally|therefore|thus|hence|in conclusion|overall|it is important/gi;
  const repRegex = /very very|really really|the fact that|in order to/gi;

  const analyzedSentences = sentences.map(sent => {
    const lower = sent.toLowerCase().trim();
    let score = 40; // base
    let reason = "";

    const wordCount = sent.split(/\s+/).length;

    // Burstiness / Uniform length penalty
    if (wordCount > 12 && wordCount < 32) score += 18;

    // Repetitive transitions
    if (transRegex.test(lower)) {
      score += 28;
      reason = "Common AI transition phrase";
    }

    // Repetition
    if (repRegex.test(lower) || (lower.match(/\b(\w+)\b.*\b\1\b/gi) || []).length > 1) {
      score += 22;
      reason = "Repetitive phrasing";
    }

    // Long complex sentences
    if (wordCount > 35) score += 15;

    if (score > 65) aiSentences++;

    aiScoreTotal += score;

    return {
      text: sent.trim(),
      score: Math.min(92, score),
      reason: reason || (score > 60 ? "Uniform & predictable" : "Natural flow")
    };
  });

  const avgScore = Math.round(aiScoreTotal / sentences.length);
  const aiPercentage = Math.round((aiSentences / sentences.length) * 100);
  const humanScore = Math.max(8, 100 - avgScore);

  return {
    humanScore: humanScore,
    aiPercentage: aiPercentage,
    sentences: analyzedSentences,
    verdict: humanScore > 72 ? "Likely Human" : humanScore > 50 ? "Mixed" : "Likely AI-Generated"
  };
}

function renderResults(result, originalText) {
  const color = result.humanScore > 65 ? 'var(--human)' : 'var(--ai)';

  let html = `
    <div class="main-score">
      <div class="score-circle" style="color: ${color}; border-color: ${color}">
        ${result.humanScore}%
        <div class="ai-prob">AI Probability: ${result.aiPercentage}%</div>
      </div>
    </div>
    <div class="verdict" style="color: ${color}">${result.verdict}</div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" style="color:var(--human)">${result.humanScore}%</div>
        <div class="stat-label">Human</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" style="color:var(--ai)">${result.aiPercentage}%</div>
        <div class="stat-label">AI</div>
      </div>
    </div>

    <div class="highlight-box">
      <h3 style="margin-bottom:18px; color:#ddd">Sentence-by-Sentence Analysis</h3>
  `;

  result.sentences.forEach(s => {
    const cls = s.score > 62 ? 'ai' : 'human';
    html += `
      <div class="sentence ${cls}">
        ${s.text}
        <div class="reason">${s.reason}</div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById('results').innerHTML = html;
  document.getElementById('results').style.display = 'block';
}

// Character count
document.getElementById('textInput').addEventListener('input', function() {
  document.getElementById('count').textContent = this.value.length;
});
</script>
</body>
</html>
