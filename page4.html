<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Detector • HumaLingo Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --human: #10b981;
      --ai: #ef4444;
      --mixed: #f59e0b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f12;
      color: #e5e5e5;
      line-height: 1.6;
      padding: 20px;
    }
    .container { max-width: 820px; margin: 40px auto; }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.4rem;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle { text-align:center; color:#888; margin-bottom:40px; }

    .input-area {
      background: #17171a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      min-height: 260px;
      background: transparent;
      border: none;
      outline: none;
      color: #e5e5e5;
      font-size: 1.02rem;
      resize: vertical;
    }
    .char-count {
      text-align: right;
      font-size: 0.85rem;
      color: #666;
      margin-top: 8px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      background: linear-gradient(90deg, #10b981, #34d399);
      color: black;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 10px 0 30px;
    }
    button:hover { opacity: 0.9; }

    .results {
      display: none;
      animation: fadeIn 0.4s;
    }
    .score-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 30px auto;
      position: relative;
      border: 12px solid #222;
      font-size: 3rem;
      font-weight: 700;
    }
    .verdict {
      text-align: center;
      font-size: 1.4rem;
      margin: 15px 0 30px;
      font-weight: 600;
    }

    .highlight-box {
      background: #17171a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      margin-top: 30px;
    }
    .sentence {
      display: block;
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .sentence.ai { background: rgba(239, 68, 68, 0.15); border-left: 4px solid var(--ai); }
    .sentence.human { background: rgba(16, 185, 129, 0.1); }
    .reason {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }

    .loader {
      text-align: center;
      padding: 60px 20px;
      display: none;
    }
    .loader.show { display: block; }
  </style>
</head>
<body>

<div class="container">
  <h1>AI Content Detector</h1>
  <p class="subtitle">Detect AI-written text like HumaLingo</p>

  <div class="input-area">
    <textarea id="textInput" placeholder="Paste your text here..."></textarea>
    <div class="char-count"><span id="count">0</span> characters</div>
  </div>

  <button onclick="analyzeText()">Scan for AI</button>

  <div class="loader" id="loader">
    <p>Analyzing text patterns...</p>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
function analyzeText() {
  const text = document.getElementById('textInput').value.trim();
  if (text.length < 50) {
    alert("Please enter at least 50 characters.");
    return;
  }

  document.getElementById('loader').classList.add('show');
  document.getElementById('results').style.display = 'none';

  setTimeout(() => {
    const result = detectAI(text);
    renderResults(result, text);
    document.getElementById('loader').classList.remove('show');
  }, 600);
}

function detectAI(text) {
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  let aiSentences = 0;
  let totalScore = 0;

  const transitionWords = /furthermore|moreover|additionally|therefore|thus|hence|in conclusion|overall|it is important|it should be noted/gi;
  const repetitivePatterns = /very very|really really|in order to|the fact that/gi;

  const highlighted = sentences.map(sent => {
    const lower = sent.toLowerCase();
    let score = 50;
    let reason = "";

    const length = sent.split(' ').length;
    if (length > 15 && length < 30) score += 15;           // uniform length
    if (transitionWords.test(lower)) { score += 25; reason = "Repetitive transition phrase"; }
    if (repetitivePatterns.test(lower)) { score += 20; reason = "Repetitive wording"; }
    if (lower.split(' ').filter(w => w.length > 8).length > 3) score += 12; // long complex words

    if (score > 70) aiSentences++;

    totalScore += score;
    return {
      text: sent.trim(),
      score: Math.min(95, score),
      reason: reason || (score > 65 ? "Uniform structure" : "Natural variation")
    };
  });

  const aiPercentage = Math.round((aiSentences / sentences.length) * 100);
  const humanScore = Math.max(5, 100 - Math.round(totalScore / sentences.length));

  return {
    humanScore: humanScore,
    aiPercentage: aiPercentage,
    sentences: highlighted,
    verdict: humanScore > 70 ? "Mostly Human" : humanScore > 45 ? "Mixed / Uncertain" : "Mostly AI-Generated"
  };
}

function renderResults(result, originalText) {
  let html = `
    <div class="score-circle" style="color: ${result.humanScore > 60 ? 'var(--human)' : 'var(--ai)'}">
      ${result.humanScore}%
      <div style="font-size:1rem;margin-top:8px;">Human</div>
    </div>
    <div class="verdict" style="color: ${result.humanScore > 60 ? '#10b981' : '#ef4444'}">
      ${result.verdict}
    </div>

    <div class="highlight-box">
      <h3 style="margin-bottom:16px;">Sentence Analysis</h3>
  `;

  result.sentences.forEach(s => {
    const cls = s.score > 65 ? 'ai' : 'human';
    html += `
      <div class="sentence ${cls}">
        ${s.text}
        <div class="reason">${s.reason}</div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById('results').innerHTML = html;
  document.getElementById('results').style.display = 'block';
}

// Live character count
document.getElementById('textInput').addEventListener('input', function() {
  document.getElementById('count').textContent = this.value.length;
});
</script>
</body>
</html>
